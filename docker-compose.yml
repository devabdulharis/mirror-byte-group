version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: telegram-download-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount .env dari host (jangan ikut di build)
      - ./.env:/app/.env:ro
      # Persistent database
      - ./data:/app/data
      # Download output (biar akses dari host)
      - ./downloads:/app/downloads
      # Logs
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:///data/bot.db
      - DOWNLOAD_PATH=./downloads
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    # Healthcheck
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('data/bot.db').execute('SELECT 1')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
